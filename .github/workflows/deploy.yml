# Workflow:
#     deploy.yml
# Description:
#     GitHub Actions CI/CD pipeline that automatically deploys the Azure
#     Function App whenever code is pushed to the main branch. Uses the
#     Function App publish profile stored as a GitHub secret for authentication.
# Author:
#     Gayatri Anne
# Created:
#     23-Jul-2026

name: Deploy Azure Function App

# Trigger deployment on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11 environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      # Step 4: Deploy to Azure Function App using publish profile
      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: func-email-triage-dev
          package: src
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}