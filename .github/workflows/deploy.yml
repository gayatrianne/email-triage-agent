# Workflow:
#     deploy.yml
# Description:
#     GitHub Actions CI/CD pipeline that automatically deploys the Azure
#     Function App whenever code is pushed to the main branch. Uses Azure
#     CLI with Flex Consumption compatible deployment method.
# Author:
#     Gayatri Anne
# Created:
#     23-Jul-2026

name: Deploy Azure Function App

# Trigger deployment on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11 environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies into src folder
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt --target src/.python_packages/lib/site-packages

      # Step 4: Login to Azure using credentials secret
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 5: Deploy to Flex Consumption Function App using Azure CLI
      - name: Deploy to Azure Function App
        run: |
          cd src
          zip -r ../deployment.zip .
          az functionapp deployment source config-zip \
            --resource-group rg-email-triage-dev \
            --name func-email-triage-dev \
            --src ../deployment.zip